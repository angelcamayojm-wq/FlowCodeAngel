name: Deploy - codeangel despliegue

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Desplegar a produccion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar y probar
        run: |
          npm install
          npm test

      - name: Desplegar aplicacion
        run: |
          echo "Iniciando despliegue de aplicacion codeangel"
          echo "Sistema desplegado correctamente"
          echo "URL: https://streamflow.example.com"
